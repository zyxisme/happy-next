name: Release
run-name: "${{ inputs.version && format('[Manual] Release {0}', inputs.version) || format('[Auto] Release {0}', github.ref_name) }}"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '[iOS App Store] App version to submit (e.g. 1.2.3)'
        required: true
        type: string

jobs:
  # ── Tag push: build APK + AAB + IPA → GitHub Release ──

  build-android:
    name: Build Android armv7 APK
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/happy-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: .

      - name: Disable lint for CI
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/disable-lint.gradle << 'GRADLE'
          allprojects {
              afterEvaluate {
                  tasks.matching { it.name.startsWith("lintVital") }.configureEach {
                      enabled = false
                  }
              }
          }
          GRADLE

      - name: Generate native Android project
        env:
          APP_VERSION: ${{ github.ref_name }}
          ABI_FILTERS: armeabi-v7a
        run: npx expo prebuild -p android --clean --no-install

      - name: Set Gradle memory limits
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties

      - name: Configure debug signing for release builds
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/ci-signing.gradle << 'GRADLE'
          allprojects {
              afterEvaluate {
                  if (it.hasProperty('android')) {
                      android.buildTypes.release.signingConfig = android.signingConfigs.debug
                  }
              }
          }
          GRADLE

      - name: Build APK
        run: |
          cd android && ./gradlew assembleRelease

      - name: Find and rename artifact
        run: |
          find . -name "*.apk" -path "*/build/outputs/*" -type f | head -5
          ARTIFACT=$(find . -name "*.apk" -path "*/build/outputs/*" -type f | head -1)
          if [ -z "$ARTIFACT" ]; then
            echo "ERROR: No apk found in build outputs"
            exit 1
          fi
          echo "Found artifact: $ARTIFACT"
          mv "$ARTIFACT" ./happy-${{ github.ref_name }}-armv7.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-armv7-apk
          path: packages/happy-app/happy-${{ github.ref_name }}-armv7.apk

  build-ios:
    name: Build iOS IPA
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-26
    defaults:
      run:
        working-directory: packages/happy-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: .

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Build IPA
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: eas build --local -p ios --profile production --non-interactive --output ./happy-${{ github.ref_name }}.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: packages/happy-app/happy-${{ github.ref_name }}.ipa

  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*

  # ── Manual trigger: iOS → App Store ──

  submit-ios:
    name: iOS → App Store
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-26
    defaults:
      run:
        working-directory: packages/happy-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: .

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Build iOS
        env:
          APP_VERSION: ${{ inputs.version }}
        run: eas build --local -p ios --profile production --non-interactive --output ./happy.ipa

      - name: Prepare ASC API Key
        run: echo "${{ secrets.ASC_API_KEY_P8_BASE64 }}" | base64 -d > /tmp/AuthKey.p8

      - name: Submit to App Store
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          jq --arg keyId "$ASC_API_KEY_ID" --arg issuerId "$ASC_ISSUER_ID" \
            '.submit.production.ios += {
              "ascApiKeyPath": "/tmp/AuthKey.p8",
              "ascApiKeyId": $keyId,
              "ascApiKeyIssuerId": $issuerId
            }' eas.json > eas.tmp.json && mv eas.tmp.json eas.json

          eas submit -p ios --profile production --path ./happy.ipa --non-interactive
