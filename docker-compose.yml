services:
  happy-app:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    ports:
      - "3030:80"
    restart: unless-stopped
    environment:
      # API server (separate origin; do not use path reverse proxy)
      - EXPO_PUBLIC_HAPPY_SERVER_URL=${EXPO_PUBLIC_HAPPY_SERVER_URL:-http://localhost:3031}
      # Voice Gateway
      - EXPO_PUBLIC_VOICE_BASE_URL=${EXPO_PUBLIC_VOICE_BASE_URL:-http://localhost:3040}
      # For docker-compose, happy-voice must call happy-server by container DNS, not host localhost.
      - EXPO_PUBLIC_VOICE_TOOL_BRIDGE_BASE_URL=${EXPO_PUBLIC_VOICE_TOOL_BRIDGE_BASE_URL:-http://happy-server:3031}
      - EXPO_PUBLIC_VOICE_PUBLIC_KEY=${VOICE_PUBLIC_KEY:-dev-voice-public-key}

  happy-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3031:3031"
    restart: unless-stopped
    environment:
      # Server
      - NODE_ENV=production
      - PORT=3031
      - HANDY_MASTER_SECRET=${HANDY_MASTER_SECRET}
      - APP_URL=${APP_URL:-http://localhost:3030}
      # Database
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Redis
      - REDIS_URL=redis://redis:6379
      # S3 / MinIO
      - S3_HOST=minio
      - S3_PORT=9000
      - S3_USE_SSL=false
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      # GitHub App
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_REDIRECT_URL=${GITHUB_REDIRECT_URL}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      # Voice tool bridge
      - VOICE_TOOL_BRIDGE_KEY=${VOICE_TOOL_BRIDGE_KEY:-dev-voice-bridge-key}
    depends_on:
      - minio
      - postgres
      - redis
      
  happy-voice:
    build:
      context: ./packages/happy-voice
      dockerfile: Dockerfile
    ports:
      - "3040:3040"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3040
      # App-facing auth (x-voice-key)
      - VOICE_PUBLIC_KEY=${VOICE_PUBLIC_KEY:-dev-voice-public-key}
      # 火山 RTC — MUST be an "AI agent" type RTC app
      - VOLC_RTC_APP_ID=${VOLC_RTC_APP_ID}
      - VOLC_RTC_APP_KEY=${VOLC_RTC_APP_KEY}
      # 火山 OpenAPI signing (IAM access key — StartVoiceChat / StopVoiceChat)
      - VOLC_ACCESS_KEY_ID=${VOLC_ACCESS_KEY_ID}
      - VOLC_SECRET_ACCESS_KEY=${VOLC_SECRET_ACCESS_KEY}
      - VOLC_RTC_REGION=${VOLC_RTC_REGION:-cn-north-1}
      - VOLC_RTC_API_VERSION=${VOLC_RTC_API_VERSION:-2025-06-01}
      # ASR (seed big-model streaming; auth bound to the agent RTC app)
      - VOLC_ASR_RESOURCE_ID=${VOLC_ASR_RESOURCE_ID:-volc.seedasr.sauc.duration}
      # LLM (Doubao via built-in ArkV3)
      - DOUBAO_MODEL=${DOUBAO_MODEL:-doubao-seed-2-0-lite-260428}
      - LLM_THINKING_TYPE=${LLM_THINKING_TYPE:-disabled}
      # Unified voice/speaker — live agent TTS + message-playback TTS
      - VOLC_TTS_VOICE=${VOLC_TTS_VOICE:-zh_female_vv_uranus_bigtts}
      # Agent TTS (bidirectional streaming for the live conversation). seed-tts-2.0
      # is required for the multilingual voices (uranus).
      - VOLC_AGENT_TTS_RESOURCE_ID=${VOLC_AGENT_TTS_RESOURCE_ID:-seed-tts-2.0}
      # Message-playback TTS (one-shot/streamed REST synthesis)
      - VOLC_TTS_APP_ID=${VOLC_TTS_APP_ID}
      - VOLC_TTS_TOKEN=${VOLC_TTS_TOKEN}
      - VOLC_TTS_CLUSTER=${VOLC_TTS_CLUSTER:-volcano_tts}
      # Pre-TTS text cleaning (LLM via Ark, regex fallback)
      - ARK_API_KEY=${ARK_API_KEY}
      - TTS_CLEAN_LLM=${TTS_CLEAN_LLM:-true}
      - TTS_CLEAN_MODEL=${TTS_CLEAN_MODEL:-doubao-seed-2-0-lite-260428}
      # Defaults
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-zh}
      - AGENT_WELCOME_MESSAGE=${AGENT_WELCOME_MESSAGE:-你好，需要我做点什么？}

  minio:
    image: minio/minio
    command: server /data
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
    ports:
      - "3050:9000"
    volumes:
      - minio_data:/data

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
